services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: receipt_reader
      POSTGRES_USER: receipt_reader
      POSTGRES_PASSWORD: receipt_reader
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  receipt-ocr:
    build:
      context: ..
      dockerfile: services/receipt-ocr/Dockerfile
    environment:
      PORT: 8080
      OCR_LANGUAGE_HINT: pol+eng
    expose:
      - "8080"

  receipt-api:
    build:
      context: ..
      dockerfile: apps/ReceiptReader.Api/Dockerfile
    depends_on:
      - receipt-ocr
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Storage__UploadRootPath: /app/AppData/uploads
      Storage__PublicBaseUrl: /uploads
      Ocr__BaseUrl: http://receipt-ocr:8080
      Ocr__LanguageHint: pol+eng
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-}
      Gemini__Enabled: "true"
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Gemini__Model: gemini-2.5-flash
      Gemini__TimeoutSeconds: 60
    expose:
      - "8080"
    volumes:
      - receipt_uploads:/app/AppData/uploads

  receipt-web:
    build:
      context: ..
      dockerfile: apps/receipt-reader-web/Dockerfile
    depends_on:
      - receipt-api
    expose:
      - "80"

volumes:
  postgres_data:
  receipt_uploads:
